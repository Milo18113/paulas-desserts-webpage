<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paula's Desserts — Pasteles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5EFE4;
    --navy: #1B2A5E;
    --gold: #B89C5A;
    --text: #2C2318;
    --text-muted: #7A6E62;
    --white: #FDFAF5;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }
  
  /* PAGE HEADER */
  .page-header {
    text-align: center;
    padding: 4rem 2rem 2.5rem;
    border-bottom: 1px solid rgba(27,42,94,0.1);
    margin-bottom: 3.5rem;
  }
  .page-header .eyebrow {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 0.75rem;
  }
  .page-header p {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* GRID */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2.5rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 3rem 6rem;
  }

  /* POLAROID CARD */
  .polaroid {
    background: var(--white);
    padding: 12px 12px 0;
    box-shadow: 0 2px 8px rgba(27,42,94,0.09), 0 1px 2px rgba(27,42,94,0.05);
    border-radius: 2px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }
  .polaroid:nth-child(odd)  { transform: rotate(-0.6deg); }
  .polaroid:nth-child(even) { transform: rotate(0.5deg); }
  .polaroid:hover {
    transform: rotate(0deg) translateY(-6px) scale(1.01) !important;
    box-shadow: 0 16px 40px rgba(27,42,94,0.16), 0 4px 10px rgba(27,42,94,0.08);
    z-index: 10;
    position: relative;
  }

  .polaroid-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: #E8E0D4;
  }

  /* photo placeholder */
  .polaroid-photo-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #EDE4D5;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(27,42,94,0.2);
    font-size: 2.5rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .polaroid-body {
    padding: 1.1rem 0.5rem 1.5rem;
  }
  .polaroid-body h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 0.5rem;
  }
  .polaroid-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.85rem;
  }
  .tag {
    font-size: 0.68rem;
    font-weight: 400;
    color: var(--text-muted);
    background: rgba(27,42,94,0.06);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .polaroid-desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.65;
    margin-bottom: 1rem;
  }
  .polaroid-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(27,42,94,0.08);
  }
  .price {
    font-size: 1rem;
    font-weight: 500;
    color: var(--navy);
  }
  .badge {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-popular { background: #FBF0DC; color: #9A7020; }
  .badge-new     { background: #DFF0E8; color: #1A6644; }
  .badge-custom  { background: #EDE4F5; color: #5C3A8A; }

  /* FOOTER */
  footer {
    background: var(--navy);
    color: rgba(232,217,184,0.6);
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }
  footer strong { color: #E8D9B8; font-style: normal; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; }
</style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand brand-link">
        <img src="Paula's_Desserts/Limon.png" alt="Logo Paula's Desserts" />
        <span class="brand-title">Paula's Desserts</span>
      </a>
      <nav class="menu">
        <div class="dropdown">
          <button type="button" class="dropbtn" aria-haspopup="true" aria-expanded="false">MENÚ</button>
          <div class="dropdown-content">
            <a href="pasteles.html">Pasteles</a>
            <a href="cupcakes.html">Cupcakes</a>
            <a href="galletas.html">Galletas</a>
            <a href="otros.html">Otros</a>
          </div>
        </div>
        <a href="sobre_nosotros.html">NOSOTROS</a>
        <a href="index.html#contacto">CONTACTO</a>
        <a href="menu_personalizacion.html">PERSONALIZAR</a>
      </nav>
    </div>
  </header>

<header class="page-header">
  <p class="eyebrow">Paula's Desserts</p>
  <h1>Pasteles</h1>
  <p>Cada pastel es horneado con amor y puede personalizarse para tu ocasión especial.</p>
</header>

<main class="menu-grid" data-categoria="Pasteles"></main>

<script src="catalogo-grid.js" defer></script>
<footer class="about-site-footer">
  <div class="about-footer-row">
    <span class="about-footer-dash"></span>
    <div class="about-footer-logo-wrap">
      <img class="about-footer-logo-img" src="Paula's_Desserts/LogoAzul.png" alt="Paula's Desserts" />
    </div>
    <span class="about-footer-dash"></span>
  </div>
</footer>
</body>
</html>
