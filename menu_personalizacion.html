<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalizar — Paula's Desserts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
<link rel="stylesheet" href="./productstyles.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand brand-link">
        <img src="Paula's_Desserts/Limon.png" alt="Logo Paula's Desserts" />
        <span class="brand-title">Paula's Desserts</span>
      </a>
      <nav class="menu">
        <div class="dropdown">
          <button type="button" class="dropbtn" aria-haspopup="true" aria-expanded="false">MENÚ</button>
          <div class="dropdown-content">
            <a href="pasteles.html">Pasteles</a>
            <a href="cupcakes.html">Cupcakes</a>
            <a href="galletas.html">Galletas</a>
            <a href="otros.html">Otros</a>
          </div>
        </div>
        <a href="SobreNosotros.html">NOSOTROS</a>
        <a href="index.html#contacto">CONTACTO</a>
        <a href="menu_personalizacion.html">PERSONALIZAR</a>
      </nav>
    </div>
  </header>

  <nav class="breadcrumb" aria-label="Migas de pan">
    <span class="breadcrumb-current">Personalización</span>
  </nav>

  <section class="product-hero">
    <div class="product-picker" id="picker-root">
      <h2 class="product-picker-title">¿Qué quieres personalizar?</h2>
      <p class="product-picker-lead">
        Elige un producto y completa el formulario. Luego copia el pedido o envíalo por WhatsApp.
      </p>
      <div class="product-picker-grid" id="picker-grid">
      </div>
    </div>
  </section>

  <footer class="about-site-footer">
    <div class="about-footer-row">
      <span class="about-footer-dash"></span>
      <div class="about-footer-logo-wrap">
        <img class="about-footer-logo-img" src="Paula's_Desserts/LogoAzul.png" alt="Paula's Desserts" />
      </div>
      <span class="about-footer-dash"></span>
    </div>
  </footer>

  <script>
    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    fetch('productos-base.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(bases => {
        const grid = document.getElementById('picker-grid');
        grid.innerHTML = bases.map(p => {
          const desc = escapeHtml(((p.descripcion || '').split('.')[0] || p.categoria || '').trim().slice(0, 100));
          const img = p.image
            ? `<img src="${escapeHtml(p.image)}" alt="" loading="lazy" width="320" height="240" />`
            : `<div class="product-picker-noimg" aria-hidden="true">Sin foto</div>`;
          return `
            <a class="product-picker-card" href="producto_personalizado.html?base=${encodeURIComponent(p.id)}">
              <div class="product-picker-img-wrap">${img}</div>
              <div class="product-picker-body">
                <span class="product-picker-cat">${escapeHtml(p.categoria)}</span>
                <span class="product-picker-name">${escapeHtml(p.nombre)}</span>
                <span class="product-picker-desc">${desc}</span>
              </div>
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('picker-grid').innerHTML =
          '<p style="grid-column:1/-1;text-align:center;opacity:0.5;">No se pudieron cargar los productos base.</p>';
      });
  </script>

</body>
</html>
